<!DOCTYPE html>
<html>
<head>
    <title>MQTT AC Remote</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background-color: #111;
            color: white;
            margin: 0;
            padding: 0;
        }

        h3 {
            padding: 10px;
        }

        #status {
            font-weight: bold;
        }

        .remote {
            margin-top: 30px;
        }

        button {
            width: 30vw;
            max-width: 150px;
            height: 60px;
            margin: 10px;
            font-size: 18px;
            border-radius: 12px;
            border: none;
            transition: 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        .power {
            background-color: red;
            color: white;
        }

        .up {
            background-color: green;
            color: white;
        }

        .down {
            background-color: blue;
            color: white;
        }

        @media (min-width: 600px) {
            button {
                width: 120px;
            }
        }
    </style>

</head>

<body>

<h3>Status: <span id="status">Connecting...</span></h3>

<div class="remote">
    <button class="power" onclick="sendMsg('1')">POWER</button><br>
    <button class="up" onclick="sendMsg('2')">UP</button><br>
    <button class="down" onclick="sendMsg('3')">DOWN</button>
</div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script>
    let client;
    const topic = "/acswitch/new";

    // 🔊 Beep sound
    function beep() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.type = "sine";
        oscillator.frequency.setValueAtTime(1000, audioCtx.currentTime);

        oscillator.start();

        gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2);

        setTimeout(() => {
            oscillator.stop();
            audioCtx.close();
        }, 200);
    }

    window.onload = function() {

        // ✅ CORRECT HiveMQ WebSocket URL
        client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt", {
            connectTimeout: 4000,
            reconnectPeriod: 2000,
            clean: true
        });

        document.getElementById("status").innerText = "Connecting...";

        client.on("connect", function () {
            console.log("MQTT Connected");
            document.getElementById("status").innerText = "Connected";
        });

        client.on("error", function (err) {
            console.log("MQTT Error:", err);
            document.getElementById("status").innerText = "Error";
        });

        client.on("offline", function () {
            console.log("MQTT Offline");
            document.getElementById("status").innerText = "Offline";
        });

        client.on("reconnect", function () {
            console.log("Reconnecting...");
            document.getElementById("status").innerText = "Reconnecting...";
        });
    };

    function sendMsg(val) {
        beep();

        if (client && client.connected) {
            client.publish(topic, val);
            console.log("Sent:", val);
        } else {
            alert("MQTT not connected");
        }
    }
</script>

</body>
</html>
